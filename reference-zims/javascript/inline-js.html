<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inline JavaScript - JS Testing Reference ZIM</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style type="text/css">
body {
   font-family: system-ui, -apple-system, sans-serif;
   max-width: 800px;
   margin: 2rem auto;
   padding: 0 1rem;
   line-height: 1.6;
}
h1 {
   color: #2c3e50;
}
.status {
   padding: 1rem;
   margin: 1rem 0;
   border-radius: 4px;
   font-weight: bold;
}
.no-js {
   background-color: #e74c3c;
   color: white;
}
.js-success {
   background-color: #27ae60;
   color: white;
}
a {
   color: #3498db;
}
.warning {
   background-color: #f39c12;
   color: white;
   padding: 0.75rem;
   margin: 1rem 0;
   border-radius: 4px;
}
</style>
</head>
<body>
   <h1>Inline JavaScript Test</h1>
   <p>This page uses inline JavaScript within <code>&lt;script&gt;</code> tags.</p>

   <div class="warning">
      ⚠ Note: This tests the use of inline JavaScript which may be blocked by Content Security Policy (CSP) in some readers.
   </div>

   <div id="status" class="status no-js">
      ✗ JavaScript did not run
   </div>

   <p id="details">The inline script was not executed.</p>

   <hr>
   <p><a href="index.html">← Back to main page</a></p>

   <script>
      // Inline JavaScript for testing
      // This script modifies the page to indicate successful execution

      (function() {
         // Update the status indicator
         var statusElement = document.getElementById('status');
         if (statusElement) {
            statusElement.textContent = '✓ JavaScript ran successfully';
            statusElement.className = 'status js-success';
         }

         // Update the details paragraph
         var detailsElement = document.getElementById('details');
         if (detailsElement) {
            detailsElement.textContent = 'The inline JavaScript code was executed successfully. Timestamp: ' + new Date().toISOString();
         }
      })();
   </script>
</body>
</html>
